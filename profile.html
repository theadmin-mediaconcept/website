<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Amplicue Web Store</title>
<meta name="theme-color" content="#2563EB">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <div class="wrap nav-row">
    <a href="index.html" class="brand"><img src="logo.png" alt="Amplicue"><span class="brand-text">Amplicue Web Store</span></a>
    <nav class="nav-links"><a href="index.html">Home</a><a href="upload.html">Submit</a></nav>
    <div class="nav-end" id="navAuth"></div>
  </div>
</nav>

<main class="wrap" style="padding-bottom:48px;">
  <!-- Profile header -->
  <div class="prof-head">
    <div class="av-ring">
      <img id="profAvatar" class="av-lg" src="logo.png" alt="Avatar" onerror="this.src='logo.png'">
      <label class="av-edit" for="avatarInput" title="Change photo">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      </label>
      <input id="avatarInput" type="file" accept="image/*" class="hidden">
    </div>
    <div>
      <h1 id="profName" style="font-size:22px;margin-bottom:3px;">—</h1>
      <p id="profEmail" style="font-size:13.5px;color:var(--text-3);margin:0 0 6px;"></p>
      <span id="profJoined" style="font-size:12px;color:var(--text-mute);"></span>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;">
      <button id="signOutBtn" class="btn btn-ghost btn-sm">Sign out</button>
    </div>
  </div>

  <!-- KPI -->
  <div class="kpi-row">
    <div class="kpi"><div class="kpi-val" id="kpiUploads">0</div><div class="kpi-lbl">Submitted</div></div>
    <div class="kpi"><div class="kpi-val" id="kpiSaved">0</div><div class="kpi-lbl">Saved</div></div>
    <div class="kpi"><div class="kpi-val" id="kpiReviews">0</div><div class="kpi-lbl">Reviews</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--success);">—</div><div class="kpi-lbl">Approved</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab prof-tab active" data-tab="websites">My Websites</button>
    <button class="tab prof-tab" data-tab="saved">Saved</button>
    <button class="tab prof-tab" data-tab="reviews">Reviews</button>
    <button class="tab prof-tab" data-tab="settings">Settings</button>
  </div>

  <div class="prof-panel" id="panel-websites" style="padding-top:24px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h2 style="font-size:17px;margin:0;">Submitted websites</h2>
      <a href="upload.html" class="btn btn-primary btn-sm">+ Submit new</a>
    </div>
    <div class="grid" id="myWebsitesGrid"><div class="spin-row" style="grid-column:1/-1;"><div class="spinner"></div> Loading…</div></div>
  </div>

  <div class="prof-panel hidden" id="panel-saved" style="padding-top:24px;">
    <h2 style="font-size:17px;margin-bottom:16px;">Saved websites</h2>
    <div class="grid" id="savedGrid"><div class="spin-row" style="grid-column:1/-1;"><div class="spinner"></div> Loading…</div></div>
  </div>

  <div class="prof-panel hidden" id="panel-reviews" style="padding-top:24px;">
    <h2 style="font-size:17px;margin-bottom:16px;">Your reviews</h2>
    <div id="myReviews"><div class="spin-row"><div class="spinner"></div> Loading…</div></div>
  </div>

  <div class="prof-panel hidden" id="panel-settings" style="padding-top:24px;">
    <h2 style="font-size:17px;margin-bottom:20px;">Account settings</h2>
    <div class="form-card" style="max-width:480px;">
      <div class="field"><label for="settingsName">Display name</label><input class="input" id="settingsName" type="text" placeholder="Your name"></div>
      <div style="margin-top:4px;"><button class="btn btn-primary" id="saveSettingsBtn">Save changes</button></div>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <a href="index.html" class="bnav-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
  </a>
  <a href="index.html?filter=trending" class="bnav-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>Trending
  </a>
  <a href="upload.html" class="bnav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Submit
  </a>
  <a href="profile.html" class="bnav-item active">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile
  </a>
</nav>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
