<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Amplicue Web Store</title>
<meta name="theme-color" content="#2563EB">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <div class="wrap nav-row">
    <a href="index.html" class="brand"><img src="logo.png" alt="Amplicue"><span class="brand-text">Amplicue Web Store</span></a>
    <nav class="nav-links"><a href="index.html">Home</a><a href="upload.html">Submit</a><a href="admin.html">Admin</a></nav>
    <div class="nav-end" id="navAuth"></div>
  </div>
</nav>

<main class="wrap" style="padding-top:28px;padding-bottom:48px;">
  <div style="margin-bottom:22px;">
    <div class="eyebrow">My workspace</div>
    <h1 style="font-size:24px;margin:4px 0 6px;">Dashboard</h1>
    <p class="text-muted text-sm">Manage your submitted websites and track performance.</p>
  </div>

  <div class="kpi-row">
    <div class="kpi"><div class="kpi-val" id="dashTotal">—</div><div class="kpi-lbl">Total submitted</div></div>
    <div class="kpi"><div class="kpi-val" id="dashApproved" style="color:var(--success);">—</div><div class="kpi-lbl">Approved</div></div>
    <div class="kpi"><div class="kpi-val" id="dashPending" style="color:var(--warning);">—</div><div class="kpi-lbl">Pending</div></div>
    <div class="kpi"><div class="kpi-val" id="dashViews">—</div><div class="kpi-lbl">Total views</div></div>
  </div>

  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;">
    <a href="upload.html" class="btn btn-primary">+ Submit new website</a>
    <a href="profile.html" class="btn">View profile</a>
  </div>

  <div class="tabs" id="dashTabs">
    <button class="tab active" data-panel="all">All</button>
    <button class="tab" data-panel="approved">Approved</button>
    <button class="tab" data-panel="pending">Pending</button>
    <button class="tab" data-panel="rejected">Rejected</button>
  </div>

  <div class="table-wrap" style="border-radius:0 0 var(--r-l) var(--r-l);border-top:none;">
    <table class="tbl">
      <thead><tr><th>Website</th><th>Category</th><th>Status</th><th>Submitted</th><th>Views</th><th></th></tr></thead>
      <tbody id="dashTableBody">
        <tr><td colspan="6" style="text-align:center;padding:32px;"><div class="spinner" style="margin:0 auto 8px;"></div>Loading…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<nav class="bottom-nav">
  <a href="index.html" class="bnav-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
  </a>
  <a href="upload.html" class="bnav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Submit
  </a>
  <a href="profile.html" class="bnav-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile
  </a>
</nav>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
