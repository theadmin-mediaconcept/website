<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Amplicue Web Store</title>
<meta name="theme-color" content="#2563EB">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card" id="loginCard">
    <img src="logo.png" alt="Amplicue" class="login-logo">
    <h1 style="font-size:22px;margin-bottom:6px;">Welcome back</h1>
    <p style="font-size:14px;color:var(--text-3);margin-bottom:28px;">Sign in to discover, review, and submit websites</p>

    <button id="googleBtn" class="btn btn-block btn-lg" style="background:#fff;border-color:var(--line);box-shadow:var(--sh-sm);">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="divider-txt">or sign in with email</div>

    <form id="loginForm" style="text-align:left;">
      <div class="field">
        <label for="loginEmail">Email address</label>
        <input class="input" id="loginEmail" type="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="loginPw">Password</label>
        <input class="input" id="loginPw" type="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginSubmitBtn">Sign in</button>
    </form>

    <p style="font-size:13px;color:var(--text-3);margin-top:20px;">
      Don't have an account? Just enter your email above and we'll create one.
    </p>
  </div>
</div>
<script type="module" src="firebase-config.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
